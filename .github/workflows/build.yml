name: build-exe

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

# Minimal scope so tag builds can create a Release and attach the exe.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: pytest -q

      - name: Build one-file exe
        run: >
          pyinstaller --onefile --windowed --name DWFX2PDF
          --collect-all pymupdf
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DWFX2PDF-exe
          path: dist/DWFX2PDF.exe

      # On a tag build, also stage a version-stamped copy so a downloaded file is
      # self-identifying, while keeping the fixed name for the latest-download URL.
      - name: Stage versioned exe
        if: startsWith(github.ref, 'refs/tags/v')
        run: Copy-Item dist/DWFX2PDF.exe "dist/DWFX2PDF-${{ github.ref_name }}.exe"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DWFX2PDF.exe
            dist/DWFX2PDF-${{ github.ref_name }}.exe
